        rewards:
          title: Beloningen
          description: Eenmalige beloningen ontvangen voor het huidige totaal van gemaakte betalingen.
        subscriptions:
          title: Abonnement
          description: |
            Beloningen toegekend op basis van Ko-fi abonnementen. Abonnementen worden dagelijks geëvalueerd. Als de laatste betaling meer dan een maand geleden was wordt de gebruiker verwijderd uit de gekoppelde groep.
        payments:
          title: Betalingen
          description: Betalingen ontvangen via Ko-fi.
        accounts:
          title: Accounts
          description: Ko-fi account koppelingen naar Discourse gebruikers.
        import:
          title: Importeren
          description: Importeer een Ko-fi CSV-transactie export.
          information: U kunt vorige betalingen importeren die nog niet zijn geregistreerd door <a href="https://ko-fi.com/manage/supportreceived">een CSV van Ko-fi</a> te downloaden en hier te uploaden. Alleen ontvangen betalingen die onbekend zijn, worden aan de database toegevoegd. Al gekende betalingen zullen worden genegeerd.<br /><br /> De CSV-export bevat geen informatie of de gebruiker deze informatie openbaar wil maken, hierdoor worden alle betalingen als privé worden gemarkeerd.
          file: CSV bestand
          make_private: Verberg gebruikersinformatie in de betalingen
          import: Importeer betalingen
          aborted: Selecteer een CSV bestand om te importeren.
          results: Importeer resultaat
          summary: '%{count} Betalingen geïmporteerd.'
          errors: Importeer fouten
          error:
            line: Regel
            message: Melding
        anonymize:
          title: Anonimiseren
          description: Verwijder persoonlijke identificeerbare informatie van betalingen.
          information: Wanneer u een Discourse gebruikersaccount anonimiseert, worden alle Ko-fi betalingen die in de database zijn geregistreerd automatisch geanonimiseerd. Dit geld ook voor betaling die in de toekomst ontvangen worden vanuit dezelfde persson.<br /> Voor bestaande accounts, geassocieerd met Discourse gebruikers, kunt u ook individueel gekoppelde accounts anonimiseren via het accountscherm.<br /> Wanneer u een verzoek ontvangt om een persoon te vergeten, kan je dit formulier gebruiken om een geanonimiseerd account voor dit e-mailadres te maken. Hierdoor worden alle eerdere en toekomstige betalingen anonimiseerd.<br /><br /> Wanneer betalingen geanonimiseerd worden, worden alle identificeerbare informatie verwijderd, inclusief het oorspronkelijk gebruikte e-mailadres. Het oorspronkelijke e-mailadres wordt gepseudo-anonimiseerd door het te hashen met SHA2. Dit maakt het mogelijk om ook toekomstige betalingen te anonimiseren.<br /><br /> Geanonimiseerde betalingen zijn niet omkeerbaar. Het verwijderen van een geanonimiseerd account maakt het mogelijk nieuwe betalingen aan een gebruiker te koppelen, maar betalingen uit het verleden kunnen niet worden gekoppeld.
          email: E-mail adres
          anonymize: Anonimiseren
          account_created: Geanonimiseerd account aangemaakt.
        status:
          title: Status
          webhook-token-configured: Webhook token geconfigureerd
          last-success-message: "Laatste succesvolle ontvangen bericht:"
          webhook-test-hint: Probeer <a href="https://ko-fi.com/manage/webhooks" target="_blank">een testbericht</a> te sturen van Ko-fi om de configuratie te verifiëren.
          last-error-message: "Fout ontvangen op:"
          status_ok: Alles is goed
          status_nok: Iets gaat mis
