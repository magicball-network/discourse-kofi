        claim:
          information: Wanneer je een ander e-mailadres gebruikt om een Ko-fi betaling te doen dan je hebt gebruikt voor je account in deze gemeenschap dan wordt uw betaling niet automatisch aan u gekoppeld. Met dit formulier kan je betalingen aan dat e-mailadres aan je community account koppelen. <br /><br /> Om een betaling te claimen, moet u de transactie-ID aanleveren. U vindt dit in de bevestigingsmail. Of u kunt <a href="https://ko-fi.com/manage/supportreceived">de details van een betaling op Ko-fi</a> bekijken en de URL in het formulier kopiëren.
          input_placeholder: Ko-fi transactie-ID of bevestigings-URL
          action: Claim
          success: Betalingen van dit e-mailadres zijn geclaimd
          errors:
            invalid_reference: Geen geldig transactie-ID gevonden.
            unknown_reference: Transactie onbekend.
            already_claimed: Deze transactie is al geclaimd.
            account_failure: Het aanmaken van een account voor deze transactie is mislukt.
